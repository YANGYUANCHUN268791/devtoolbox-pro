<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevToolBox Pro - Developer Toolbox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b,#334155);padding:20px;text-align:center;border-bottom:1px solid #475569}
.header h1{font-size:28px;background:linear-gradient(90deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;gap:4px;padding:10px 12px;background:#1e293b;overflow-x:auto;border-bottom:1px solid #334155;flex-wrap:wrap}
.nav button{padding:6px 12px;border:1px solid #475569;background:transparent;color:#cbd5e1;border-radius:6px;cursor:pointer;white-space:nowrap;font-size:13px}
.nav button:hover,.nav button.active{background:#334155;border-color:#38bdf8;color:#38bdf8}
.main{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.panel{background:#1e293b;border-radius:8px;border:1px solid #334155;overflow:hidden}
.panel-title{background:#334155;padding:8px 12px;font-size:13px;font-weight:600;color:#e2e8f0;display:flex;justify-content:space-between;align-items:center}
.panel-body{padding:10px}
textarea,.result-box{width:100%;min-height:200px;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;padding:10px;font-family:'Cascadia Code','Fira Code',monospace;font-size:13px;resize:vertical;outline:none}
textarea:focus{border-color:#38bdf8}
.toolbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.btn{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#059669;color:#fff}.btn-success:hover{background:#047857}
.btn-warning{background:#d97706;color:#fff}.btn-danger{background:#dc2626;color:#fff}
.badge{position:fixed;top:16px;right:16px;background:#059669;color:#fff;padding:10px 18px;border-radius:20px;font-weight:700;box-shadow:0 4px 12px rgba(5,150,105,.3);z-index:100;cursor:pointer;font-size:14px}
.footer{text-align:center;padding:16px;color:#64748b;font-size:12px;border-top:1px solid #334155}
@media(max-width:768px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="badge" onclick="alert('Purchase full Pro version: 199 RMB\n15+ Tools included\nContact: cao63571@gmail.com')">Pro 199</div>
<div class="header"><h1>DevToolBox Pro</h1><p>15+ Developer Tools - One HTML File - Zero Dependencies</p></div>
<div class="nav" id="navBar"></div>
<div class="main" id="mainArea">
<div class="panel"><div class="panel-title">Input</div><div class="panel-body"><div class="toolbar"><button class="btn btn-primary" onclick="process()">Convert</button><button class="btn btn-warning" onclick="clearAll()">Clear</button><button class="btn btn-success" onclick="copyOut()">Copy</button></div><textarea id="inputBox" placeholder="Input here..."></textarea></div></div>
<div class="panel"><div class="panel-title">Output <span style="font-size:11px;color:#64748b">Pro: unlimited use</span></div><div class="panel-body"><textarea id="outputBox" style="background:#0a0f1a" readonly></textarea></div></div>
</div>
<div class="footer">DevToolBox Pro v1.0 | 15+ Tools | Business License: 499 RMB | cao63571@gmail.com</div>
<script>
const tools={
json:{label:"JSON Formatter",ph:"Paste JSON here...",fn:function(i){return JSON.stringify(JSON.parse(i),null,2)}},
base64:{label:"Base64 Enc",ph:"Text to encode...",fn:function(i){return btoa(i)}},
base64d:{label:"Base64 Dec",ph:"Base64 to decode...",fn:function(i){return atob(i.trim())}},
url:{label:"URL Encode",ph:"Text to encode...",fn:function(i){return encodeURIComponent(i)}},
urld:{label:"URL Decode",ph:"URL to decode...",fn:function(i){return decodeURIComponent(i)}},
strlen:{label:"String Stats",ph:"Enter text...",fn:function(i){var c=i.length,ch=i.replace(/\s/g,"").length,w=i.trim()?i.trim().split(/\s+/).length:0,l=i.split("\n").length;return"Chars: "+c+"\nNon-space: "+ch+"\nWords: "+w+"\nLines: "+l+"\nBytes: "+new Blob([i]).size}},
hex:{label:"Hex Encode",ph:"Text to hex...",fn:function(i){return Array.from(i).map(function(c){return c.charCodeAt(0).toString(16).padStart(2,"0")}).join(" ")}},
hexd:{label:"Hex Decode",ph:"Hex to text...",fn:function(i){return i.trim().split(/\s+/).map(function(h){return String.fromCharCode(parseInt(h,16))}).join("")}},
html:{label:"HTML Escape",ph:"HTML to escape...",fn:function(i){return i.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}},
htmld:{label:"HTML Unescape",ph:"Escaped HTML...",fn:function(i){return i.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"')}},
uuid:{label:"UUID Gen",ph:"Click Convert...",fn:function(){var r=function(){return"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c=="x"?r:(r&3|8)).toString(16)})};var o="";for(var i=0;i<10;i++)o+=r()+"\n";return o.trim()}},
ts:{label:"Timestamp",ph:"Enter unix ts or leave empty",fn:function(i){if(!i.trim()){var n=Date.now();return"Now (ms): "+n+"\nNow (s): "+Math.floor(n/1000)+"\nISO: "+new Date().toISOString()}var t=parseInt(i.trim());return i.trim().length>12?"From ms: "+new Date(t).toLocaleString():i.trim().length==10?"From s: "+new Date(t*1000).toLocaleString():"Invalid"}},
csvjson:{label:"CSV > JSON",ph:"CSV (first line = headers)...",fn:function(i){var l=i.trim().split("\n");if(l.length<2)return"Need >=2 lines";var h=l[0].split(",").map(function(x){return x.trim()});var r=[];for(var j=1;j<l.length;j++){var v=l[j].split(",");var o={};for(var k=0;k<h.length;k++)o[h[k]]=(v[k]||"").trim();r.push(o)}return JSON.stringify(r,null,2)}},
jsoncsv:{label:"JSON > CSV",ph:"JSON array...",fn:function(i){var d=JSON.parse(i);if(!Array.isArray(d)||!d.length)return"Need non-empty array";var h=Object.keys(d[0]);var l=[h.join(",")];for(var j=0;j<d.length;j++){l.push(h.map(function(k){var v=d[j][k];return v===null||v===undefined?"":String(v).match(/[,"\n]/)?'"'+String(v).replace(/"/g,'""')+'"':v}).join(","))}return l.join("\n")}},
};
var curTool="json";
function initNav(){
var nav=document.getElementById("navBar");
Object.keys(tools).forEach(function(k){
var t=tools[k];
var b=document.createElement("button");
b.textContent=t.label;
b.dataset.tool=k;
b.onclick=function(){
document.querySelectorAll("#navBar button").forEach(function(x){x.classList.remove("active")});
this.classList.add("active");curTool=k;
document.getElementById("inputBox").value="";
document.getElementById("outputBox").value="";
document.getElementById("inputBox").placeholder=t.ph||"Input..."
};
if(k==="json")b.classList.add("active");
nav.appendChild(b)});
}
function process(){
var box=document.getElementById("inputBox");
var out=document.getElementById("outputBox");
var t=tools[curTool];
try{var r=t.fn(box.value);out.value=String(r)}catch(e){out.value="Error: "+e.message}
}
function clearAll(){document.getElementById("inputBox").value="";document.getElementById("outputBox").value=""}
function copyOut(){var o=document.getElementById("outputBox");o.select();navigator.clipboard.writeText(o.value).then(function(){alert("Copied!")})}
initNav();
</script>
</body>
</html>
